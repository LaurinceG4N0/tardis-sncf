name: TARDIS
run-name: TARDIS · ${{ github.event_name }} · ${{ github.actor }}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:

  coding_style:
    name: Coding Style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install ruff
        run: curl -LsSf https://astral.sh/ruff/install.sh | sh

      - name: Check format
        run: ruff format --check .

      - name: Check lint
        run: ruff check . --output-format=github

  check_deliverables:
    name: Check Deliverables
    runs-on: ubuntu-latest
    needs: coding_style
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify required files
        shell: bash
        run: |
          MISSING=0
          for f in requirements.txt tardis_eda.ipynb tardis_model.ipynb tardis_dashboard.py README.md; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Missing required file: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ ! -f "model.pkl" ] && [ ! -f "model.joblib" ]; then
            echo "::error::Missing model file (model.pkl or model.joblib)"
            MISSING=$((MISSING + 1))
          fi
          [ "$MISSING" -eq 0 ] || exit 1

  install_dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: check_deliverables
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3-pip
          pip3 install -r requirements.txt --break-system-packages

      - name: Verify key imports
        run: |
          python3 -c "
          import pandas, numpy, matplotlib, seaborn, sklearn, streamlit, joblib
          "

  run_notebooks:
    name: Run Notebooks
    runs-on: ubuntu-latest
    needs: install_dependencies
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Register kernel
        run: .venv/bin/python -m ipykernel install --user --name=ci-venv

      - name: Prepare dataset
        run: |
          [ -f "cleaned_dataset.csv" ] && cp cleaned_dataset.csv dataset.csv || true

      - name: Execute tardis_eda.ipynb
        timeout-minutes: 10
        run: |
          .venv/bin/python -m nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=300 \
            --ExecutePreprocessor.kernel_name=ci-venv \
            tardis_eda.ipynb

      - name: Check cleaned_dataset.csv
        run: |
          [ -f "cleaned_dataset.csv" ] || { echo "::error::cleaned_dataset.csv not produced"; exit 1; }

      - name: Execute tardis_model.ipynb
        timeout-minutes: 15
        run: |
          .venv/bin/python -m nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=600 \
            --ExecutePreprocessor.kernel_name=ci-venv \
            tardis_model.ipynb

      - name: Check model file
        run: |
          { [ -f "model.joblib" ]; } || { echo "::error::No model file produced"; exit 1; }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebooks
          path: |
            tardis_eda.ipynb
            tardis_model.ipynb
            cleaned_dataset.csv

  validate_dashboard:
    name: Validate Dashboard
    runs-on: ubuntu-latest
    needs: run_notebooks
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3-pip
          pip3 install -r requirements.txt --break-system-packages

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: notebooks

      - name: Check syntax
        run: python3 -m py_compile tardis_dashboard.py

      - name: Check must-have features
        run: |
          python3 - << 'PYEOF'
          import re, sys

          with open("tardis_dashboard.py") as f:
              src = f.read()

          checks = {
              "Delay distribution chart":  r"st\.plotly_chart|px\.|go\.",
              "Summary statistics panel":  r"st\.metric|st\.write",
              "Prediction interface":      r"st\.button|st\.form",
              "Model loading":             r"joblib\.load",
          }

          failed = [label for label, pat in checks.items() if not re.search(pat, src)]
          for label in failed:
              print(f"::error::{label} not found in tardis_dashboard.py")

          sys.exit(len(failed))
          PYEOF

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - coding_style
      - check_deliverables
      - install_dependencies
      - run_notebooks
      - validate_dashboard
    if: always()
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Write summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'MD'
          ## TARDIS — CI Results

          | Job                  | Status                                              |
          |----------------------|-----------------------------------------------------|
          | Coding Style         | ${{ needs.coding_style.result }}         |
          | Deliverables         | ${{ needs.check_deliverables.result }}   |
          | Dependencies         | ${{ needs.install_dependencies.result }} |
          | Notebooks            | ${{ needs.run_notebooks.result }}        |
          | Dashboard            | ${{ needs.validate_dashboard.result }}   |
          MD